<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator napiwków | testowanie</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Kalkulator napiwków</h1>
        <div class="form-group">
            <label for="bill">Kwota rachunku (PLN):</label>
            <input type="number" id="bill" step="0.01" placeholder="np. 85.50">
        </div>
        <div class="form-group">
            <label for="tipPercent">Napiwek (%):</label>
            <input type="number" id="tipPercent" step="1" value="10">
        </div>
        <button id="calculateBtn">Oblicz</button>
        <div class="result" id="result"></div>
    </div>
</body>
</html>
